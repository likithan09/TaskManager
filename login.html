<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <div class="login-box">

        <h1>Login</h1>

        <input
            type="email"
            id="loginEmail"
            placeholder="Email"
        >

        <input
            type="password"
            id="loginPassword"
            placeholder="Password"
        >

        <button id="loginBtn">
            Login
        </button>

        <p>
            Don't have an account?
            <a href="register.html">Register</a>
        </p>

    </div>
</div>

<script type="module" src="js/login.js"></script>

</body>
</html>
