<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task Manager Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    
    <h1>Task Manager Dashboard 🚀</h1>

    <h3 id="userEmail">Logged in User</h3>

    <button id="logoutBtn">Logout</button>

    <hr>

    <h3>Total Tasks: <span id="totalTasks">0</span></h3>
    <h3>Completed Tasks: <span id="completedTasks">0</span></h3>
    <h3>Pending Tasks: <span id="pendingTasks">0</span></h3>
    <input type="text" id="searchTask" placeholder="Search Tasks">
    <h3>Progress: <span id="progressPercent">0%</span></h3>

    <hr>

   <input type="text" id="taskInput">

<input type="date" id="taskDate">

<button id="addTaskBtn">Add Task</button>

<ul id="taskList"></ul>

<span id="totalTasks">0</span>

<span id="completedTasks">0</span>

<span id="pendingTasks">0</span>

    <script src="js/task.js"></script>

</body>
</html>
